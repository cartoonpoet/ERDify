name: Build & Deploy

on:
  push:
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/erdify
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── 변경된 경로 감지 ──────────────────────────────────────────────────────
  changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      api:     ${{ steps.filter.outputs.api }}
      web:     ${{ steps.filter.outputs.web }}
      landing: ${{ steps.filter.outputs.landing }}
      infra:   ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'packages/db/**'
              - 'packages/domain/**'
              - 'packages/contracts/**'
              - 'apps/api/Dockerfile'
              - 'apps/api/docker-entrypoint.sh'
            web:
              - 'apps/web/**'
              - 'packages/erd-ui/**'
              - 'packages/domain/**'
              - 'packages/contracts/**'
              - 'apps/web/Dockerfile'
              - 'apps/web/nginx.conf'
            landing:
              - 'apps/landing/**'
              - 'apps/landing/Dockerfile'
              - 'apps/landing/nginx.conf'
            infra:
              - '.github/workflows/**'
              - 'docker-compose*.yml'
              - 'scripts/**'
              - 'nginx/**'
              - 'pnpm-lock.yaml'

  # ── 테스트 (변경된 앱만, 빌드 전 실행) ──────────────────────────────────
  test-web:
    name: Test Web
    needs: changes
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Enable corepack & install pnpm
        run: corepack enable && corepack prepare pnpm@10.32.1 --activate
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run web tests
        run: pnpm --filter @erdify/web test

  test-api:
    name: Test API
    needs: changes
    if: needs.changes.outputs.api == 'true' || needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Enable corepack & install pnpm
        run: corepack enable && corepack prepare pnpm@10.32.1 --activate
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run API tests
        run: pnpm --filter @erdify/api test

  # ── 이미지 빌드 (변경된 앱만, 병렬 실행) ─────────────────────────────────
  build-api:
    name: Build API Image
    needs: [changes, test-api]
    if: needs.changes.outputs.api == 'true' || needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-api:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

  build-web:
    name: Build Web Image
    needs: [changes, test-web]
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-web:latest
          build-args: |
            VITE_API_BASE_URL=
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  build-landing:
    name: Build Landing Image
    needs: changes
    if: needs.changes.outputs.landing == 'true' || needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/landing/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-landing:latest
          cache-from: type=gha,scope=landing
          cache-to: type=gha,mode=max,scope=landing

  # ── Blue/Green 배포 ───────────────────────────────────────────────────────
  deploy:
    name: Blue/Green Deploy to Oracle Cloud
    runs-on: ubuntu-latest
    needs: [changes, test-web, test-api, build-api, build-web, build-landing]
    # 변경 사항이 있고 테스트·빌드가 모두 성공(또는 스킵)된 경우에만 배포
    if: |
      always() &&
      (needs.changes.outputs.api     == 'true' ||
       needs.changes.outputs.web     == 'true' ||
       needs.changes.outputs.landing == 'true' ||
       needs.changes.outputs.infra   == 'true') &&
      needs.test-web.result     != 'failure' &&
      needs.test-api.result     != 'failure' &&
      needs.build-api.result    != 'failure' &&
      needs.build-web.result    != 'failure' &&
      needs.build-landing.result != 'failure'
    permissions:
      contents: read
      packages: read

    steps:
      - name: Deploy via SSH
        id: ssh
        uses: appleboy/ssh-action@v1
        env:
          DEPLOY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GH_ACTOR,DEPLOY_TOKEN
          script: |
            echo "$DEPLOY_TOKEN" | sudo docker login ghcr.io -u "$GH_ACTOR" --password-stdin
            cd /opt/erdify/repo
            git pull origin master
            chmod +x scripts/setup.sh scripts/deploy.sh
            bash scripts/setup.sh
            bash scripts/deploy.sh

      - name: Prepare commit subject
        id: commit
        env:
          MSG: ${{ github.event.head_commit.message }}
        run: echo "subject=${MSG%%$'\n'*}" >> $GITHUB_OUTPUT

      - name: Telegram — 배포 성공
        if: success()
        uses: appleboy/telegram-action@v1.0.0
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: html
          message: |
            ✅ <b>ERDify 배포 완료</b>
            • 커밋: <code>${{ github.sha }}</code>
            • 메시지: ${{ steps.commit.outputs.subject }}
            • 배포자: ${{ github.actor }}
            • 시각: ${{ github.event.head_commit.timestamp }}

      - name: Telegram — 배포 실패
        if: failure()
        uses: appleboy/telegram-action@v1.0.0
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: html
          message: |
            ❌ <b>ERDify 배포 실패</b>
            • 커밋: <code>${{ github.sha }}</code>
            • 메시지: ${{ steps.commit.outputs.subject }}
            • 배포자: ${{ github.actor }}
            • 로그: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
