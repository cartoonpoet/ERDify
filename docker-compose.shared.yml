services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-erdify}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-erdify}
    volumes:
      - erdify_postgres_data:/var/lib/postgresql/data
    networks:
      - erdify-db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-erdify}"]
      interval: 5s
      timeout: 5s
      retries: 10

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/00-main.conf:ro
      - ./nginx/ssl-params.conf:/etc/nginx/conf.d/ssl-params.conf:ro
      - /dev/null:/etc/nginx/conf.d/default.conf:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
    networks:
      - erdify-proxy

  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
      - ./nginx/certbot-entrypoint.sh:/certbot-entrypoint.sh:ro
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: ["/bin/sh", "/certbot-entrypoint.sh"]

volumes:
  erdify_postgres_data:
    name: erdify_postgres_data
  erdify_uploads:
    name: erdify_uploads
  certbot_certs:
    name: certbot_certs
  certbot_webroot:
    name: certbot_webroot

networks:
  erdify-proxy:
    external: true
    name: erdify-proxy
  erdify-db:
    external: true
    name: erdify-db
