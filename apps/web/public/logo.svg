    <path d="M24 4.2c2.2 0 3.8 1.3 5.2 2.8L41 18.8c3 3 3 7.4 0 10.4L29.2 41c-3 3-7.4 3-10.4 0L7 29.2c-3-3-3-7.4 0-10.4L18.8 7c1.4-1.5 3.1-2.8 5.2-2.8Z"
