<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 720" role="img" aria-label="ERDify Toss-like logo concepts">
  <defs>
    <style>
      .page { fill: #f8f9fb; }
      .card { fill: #fff; stroke: #dee3e9; stroke-width: 1; }
      .title { fill: #1c2b33; font: 800 34px Pretendard, Inter, system-ui, sans-serif; letter-spacing: 0; }
      .lead { fill: #5d6c7b; font: 500 16px Pretendard, Inter, system-ui, sans-serif; letter-spacing: 0; }
      .name { fill: #1c2b33; font: 800 17px Pretendard, Inter, system-ui, sans-serif; letter-spacing: 0; }
      .desc { fill: #5d6c7b; font: 500 12px Pretendard, Inter, system-ui, sans-serif; letter-spacing: 0; }
      .number { fill: #5d6c7b; font: 800 12px Pretendard, Inter, system-ui, sans-serif; letter-spacing: 0; }
      .recommended { fill: #eef4ff; stroke: #0064e0; stroke-width: 1.5; }
    </style>
    <linearGradient id="flowA" x1="64" y1="42" x2="192" y2="196" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2b7cf5"/>
      <stop offset=".55" stop-color="#0064e0"/>
      <stop offset="1" stop-color="#0143b5"/>
    </linearGradient>
    <linearGradient id="flowB" x1="50" y1="58" x2="200" y2="190" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4f9bff"/>
      <stop offset="1" stop-color="#0064e0"/>
    </linearGradient>
    <linearGradient id="flowC" x1="48" y1="36" x2="194" y2="200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00a6ed"/>
      <stop offset=".62" stop-color="#0064e0"/>
      <stop offset="1" stop-color="#01337f"/>
    </linearGradient>
    <linearGradient id="flowD" x1="42" y1="50" x2="202" y2="190" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6aa8ff"/>
      <stop offset=".52" stop-color="#0064e0"/>
      <stop offset="1" stop-color="#071f5f"/>
    </linearGradient>
    <linearGradient id="flowE" x1="56" y1="46" x2="198" y2="194" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2b7cf5"/>
      <stop offset="1" stop-color="#0b4abf"/>
    </linearGradient>
    <linearGradient id="flowF" x1="50" y1="48" x2="198" y2="192" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0064e0"/>
      <stop offset="1" stop-color="#1c2b33"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="11" flood-color="#0064e0" flood-opacity=".18"/>
    </filter>
  </defs>

  <rect width="1120" height="720" class="page"/>
  <text x="56" y="70" class="title">Toss-Like Direction, Not a Copy</text>
  <text x="56" y="100" class="lead">Soft, abstract, blue, slightly dynamic. Each mark is one closed shape.</text>

  <g transform="translate(56 142)">
    <rect width="320" height="220" rx="14" class="recommended"/>
    <text x="24" y="34" class="number">T1</text>
    <path filter="url(#softShadow)" fill="url(#flowA)" d="M160 38c28 15 55 39 65 69 11 33-9 66-43 83-34 18-76 8-97-21-22-30-16-69 11-96 18-18 39-29 64-35Z"/>
    <text x="24" y="170" class="name">Flow Diamond</text>
    <text x="24" y="193" class="desc">Recommended. Toss-like softness + ERD diamond memory.</text>
  </g>

  <g transform="translate(400 142)">
    <rect width="320" height="220" rx="14" class="card"/>
    <text x="24" y="34" class="number">T2</text>
    <path filter="url(#softShadow)" fill="url(#flowB)" d="M121 43c42-10 80 14 91 50 10 34-14 69-52 86-40 18-82 6-99-28-15-31 0-66 31-90 9-7 18-13 29-18Z"/>
    <text x="24" y="170" class="name">Soft Orbit</text>
    <text x="24" y="193" class="desc">More friendly and app-like, less ERD-specific.</text>
  </g>

  <g transform="translate(744 142)">
    <rect width="320" height="220" rx="14" class="card"/>
    <text x="24" y="34" class="number">T3</text>
    <path filter="url(#softShadow)" fill="url(#flowC)" d="M99 53c31-20 74-13 100 14 28 30 27 73-4 101-31 29-79 34-113 7-34-26-39-70-13-101 8-9 18-15 30-21Z"/>
    <text x="24" y="170" class="name">Data Pebble</text>
    <text x="24" y="193" class="desc">Smooth and modern. Strong mobile-app feel.</text>
  </g>

  <g transform="translate(56 402)">
    <rect width="320" height="220" rx="14" class="card"/>
    <text x="24" y="34" class="number">T4</text>
    <path filter="url(#softShadow)" fill="url(#flowD)" d="M92 59c37-29 90-23 119 10 27 31 18 76-18 103-36 28-87 25-113-6-27-31-21-75 12-107Z"/>
    <text x="24" y="170" class="name">Tilted Capsule</text>
    <text x="24" y="193" class="desc">Closest to Toss-like motion; also highest similarity risk.</text>
  </g>

  <g transform="translate(400 402)">
    <rect width="320" height="220" rx="14" class="card"/>
    <text x="24" y="34" class="number">T5</text>
    <path filter="url(#softShadow)" fill="url(#flowE)" d="M160 40c22 17 51 36 59 65 8 30-9 62-37 79-28 18-67 16-93-6-26-22-34-59-18-88 16-30 51-43 89-50Z"/>
    <text x="24" y="170" class="name">Folded Relation</text>
    <text x="24" y="193" class="desc">Abstract relation mark, less generic than a circle.</text>
  </g>

  <g transform="translate(744 402)">
    <rect width="320" height="220" rx="14" class="card"/>
    <text x="24" y="34" class="number">T6</text>
    <path filter="url(#softShadow)" fill="url(#flowF)" d="M93 63c30-30 82-31 114-2 31 29 31 77-1 106-33 31-86 30-116-3-28-31-27-74 3-101Z"/>
    <text x="24" y="170" class="name">Enterprise Flow</text>
    <text x="24" y="193" class="desc">Darker, more B2B. Less playful than T2-T4.</text>
  </g>
</svg>
