<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800">
  <defs>
    <pattern id="dots" patternUnits="userSpaceOnUse" width="24" height="24">
      <circle cx="0.5" cy="0.5" r="0.8" fill="#BCC0C4" opacity="0.45"/>
    </pattern>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#1C2B33" flood-opacity="0.08"/>
    </filter>
    <filter id="mshadow" x="-5%" y="-5%" width="115%" height="125%">
      <feDropShadow dx="0" dy="8" stdDeviation="24" flood-color="#1C2B33" flood-opacity="0.22"/>
    </filter>
    <clipPath id="cu"><rect x="100" y="180" width="200" height="114" rx="8"/></clipPath>
    <clipPath id="cp"><rect x="420" y="160" width="210" height="140" rx="8"/></clipPath>
  </defs>

  <!-- Canvas background (dimmed) -->
  <rect width="1280" height="800" fill="#F8F9FB"/>
  <rect y="44" width="1280" height="756" fill="url(#dots)" opacity="0.5"/>

  <!-- ── TOPBAR (faded) ── -->
  <rect width="1280" height="44" fill="white" opacity="0.7"/>
  <line x1="0" y1="44" x2="1280" y2="44" stroke="#DEE3E9" stroke-width="1"/>
  <text x="46" y="28" font-size="16" font-weight="800" fill="#0064E0" opacity="0.5" font-family="sans-serif">⬡</text>
  <text x="63" y="28" font-size="14" font-weight="800" fill="#1C2B33" opacity="0.5" font-family="sans-serif">ERDify</text>
  <text x="111" y="28" font-size="13" fill="#DEE3E9" font-family="sans-serif">/</text>
  <text x="122" y="28" font-size="13" font-weight="600" fill="#1C2B33" opacity="0.5" font-family="sans-serif">ecommerce_db</text>

  <!-- Background tables (faded) -->
  <rect x="100" y="180" width="200" height="114" rx="8" fill="white" stroke="#DEE3E9" stroke-width="1" opacity="0.5"/>
  <rect x="100" y="180" width="200" height="36" fill="#0064E0" opacity="0.5" clip-path="url(#cu)"/>
  <text x="118" y="203" font-size="12" font-weight="700" fill="white" opacity="0.6" font-family="sans-serif">users</text>

  <rect x="420" y="160" width="210" height="140" rx="8" fill="white" stroke="#DEE3E9" stroke-width="1" opacity="0.5"/>
  <rect x="420" y="160" width="210" height="36" fill="#7C3AED" opacity="0.5" clip-path="url(#cp)"/>
  <text x="438" y="183" font-size="12" font-weight="700" fill="white" opacity="0.6" font-family="sans-serif">posts</text>

  <!-- Modal backdrop -->
  <rect width="1280" height="800" fill="rgba(28,43,51,0.45)"/>

  <!-- ── MODAL ── -->
  <rect x="280" y="80" width="720" height="640" rx="20" fill="white" filter="url(#mshadow)"/>

  <!-- Modal header -->
  <line x1="280" y1="132" x2="1000" y2="132" stroke="#DEE3E9" stroke-width="1"/>
  <text x="316" y="114" font-size="16" font-weight="700" fill="#1C2B33" font-family="sans-serif">DDL 가져오기</text>
  <!-- close btn -->
  <rect x="962" y="88" width="30" height="30" rx="8" fill="#F1F4F7"/>
  <text x="977" y="109" text-anchor="middle" font-size="18" fill="#5D6C7B" font-family="sans-serif">×</text>

  <!-- Dialect tabs -->
  <rect x="316" y="148" width="660" height="36" rx="8" fill="#F1F4F7"/>
  <!-- MySQL tab (active) -->
  <rect x="318" y="150" width="100" height="32" rx="6" fill="white"/>
  <text x="368" y="171" text-anchor="middle" font-size="12" font-weight="600" fill="#0064E0" font-family="sans-serif">MySQL</text>
  <!-- Active indicator -->
  <rect x="348" y="179" width="40" height="2" rx="1" fill="#0064E0"/>
  <!-- PostgreSQL tab -->
  <text x="490" y="171" text-anchor="middle" font-size="12" font-weight="500" fill="#5D6C7B" font-family="sans-serif">PostgreSQL</text>
  <!-- MariaDB tab -->
  <text x="610" y="171" text-anchor="middle" font-size="12" font-weight="500" fill="#5D6C7B" font-family="sans-serif">MariaDB</text>

  <!-- Textarea label -->
  <text x="316" y="215" font-size="13" font-weight="600" fill="#1C2B33" font-family="sans-serif">SQL 붙여넣기</text>
  <text x="316" y="232" font-size="11" fill="#5D6C7B" font-family="sans-serif">CREATE TABLE 구문을 입력하면 자동으로 ERD가 생성됩니다.</text>

  <!-- Code textarea -->
  <rect x="316" y="244" width="648" height="360" rx="8" fill="#1C2B33" stroke="#DEE3E9" stroke-width="1"/>
  <!-- Line numbers gutter -->
  <rect x="316" y="244" width="38" height="360" rx="8" fill="#151E25"/>
  <rect x="316" y="244" width="38" height="360" fill="#151E25"/>
  <rect x="316" y="244" width="38" height="8" fill="#151E25"/>
  <rect x="316" y="596" width="38" height="8" fill="#151E25"/>
  <!-- line number text -->
  <text x="346" y="268" text-anchor="end" font-size="11" fill="#5D6C7B" font-family="monospace"> 1</text>
  <text x="346" y="284" text-anchor="end" font-size="11" fill="#5D6C7B" font-family="monospace"> 2</text>
  <text x="346" y="300" text-anchor="end" font-size="11" fill="#5D6C7B" font-family="monospace"> 3</text>
  <text x="346" y="316" text-anchor="end" font-size="11" fill="#5D6C7B" font-family="monospace"> 4</text>
  <text x="346" y="332" text-anchor="end" font-size="11" fill="#5D6C7B" font-family="monospace"> 5</text>
  <text x="346" y="348" text-anchor="end" font-size="11" fill="#5D6C7B" font-family="monospace"> 6</text>
  <text x="346" y="364" text-anchor="end" font-size="11" fill="#5D6C7B" font-family="monospace"> 7</text>
  <text x="346" y="380" text-anchor="end" font-size="11" fill="#5D6C7B" font-family="monospace"> 8</text>
  <text x="346" y="396" text-anchor="end" font-size="11" fill="#5D6C7B" font-family="monospace"> 9</text>
  <text x="346" y="412" text-anchor="end" font-size="11" fill="#5D6C7B" font-family="monospace">10</text>
  <text x="346" y="428" text-anchor="end" font-size="11" fill="#5D6C7B" font-family="monospace">11</text>
  <text x="346" y="444" text-anchor="end" font-size="11" fill="#5D6C7B" font-family="monospace">12</text>
  <text x="346" y="460" text-anchor="end" font-size="11" fill="#5D6C7B" font-family="monospace">13</text>
  <text x="346" y="476" text-anchor="end" font-size="11" fill="#5D6C7B" font-family="monospace">14</text>
  <text x="346" y="492" text-anchor="end" font-size="11" fill="#5D6C7B" font-family="monospace">15</text>
  <text x="346" y="508" text-anchor="end" font-size="11" fill="#5D6C7B" font-family="monospace">16</text>
  <text x="346" y="524" text-anchor="end" font-size="11" fill="#5D6C7B" font-family="monospace">17</text>
  <text x="346" y="540" text-anchor="end" font-size="11" fill="#5D6C7B" font-family="monospace">18</text>
  <text x="346" y="556" text-anchor="end" font-size="11" fill="#5D6C7B" font-family="monospace">19</text>
  <text x="346" y="572" text-anchor="end" font-size="11" fill="#5D6C7B" font-family="monospace">20</text>
  <text x="346" y="588" text-anchor="end" font-size="11" fill="#5D6C7B" font-family="monospace">21</text>

  <!-- vertical divider in gutter -->
  <line x1="354" y1="244" x2="354" y2="604" stroke="#2A3A45" stroke-width="1"/>

  <!-- SQL code content -->
  <!-- Line 1 -->
  <text x="364" y="268" font-size="11" fill="#569CD6" font-family="monospace">CREATE</text>
  <text x="412" y="268" font-size="11" fill="#569CD6" font-family="monospace"> TABLE</text>
  <text x="460" y="268" font-size="11" fill="#9CDCFE" font-family="monospace"> users</text>
  <text x="502" y="268" font-size="11" fill="#D4D4D4" font-family="monospace"> (</text>
  <!-- Line 2 -->
  <text x="380" y="284" font-size="11" fill="#9CDCFE" font-family="monospace">id</text>
  <text x="396" y="284" font-size="11" fill="#569CD6" font-family="monospace"> INT</text>
  <text x="424" y="284" font-size="11" fill="#D4D4D4" font-family="monospace"> NOT NULL</text>
  <text x="488" y="284" font-size="11" fill="#569CD6" font-family="monospace"> AUTO_INCREMENT</text>
  <text x="600" y="284" font-size="11" fill="#D4D4D4" font-family="monospace">,</text>
  <!-- Line 3 -->
  <text x="380" y="300" font-size="11" fill="#9CDCFE" font-family="monospace">name</text>
  <text x="416" y="300" font-size="11" fill="#569CD6" font-family="monospace"> VARCHAR</text>
  <text x="472" y="300" font-size="11" fill="#D4D4D4" font-family="monospace">(100)</text>
  <text x="512" y="300" font-size="11" fill="#D4D4D4" font-family="monospace"> NOT NULL</text>
  <text x="576" y="300" font-size="11" fill="#4EC9B0" font-family="monospace"> COMMENT</text>
  <text x="636" y="300" font-size="11" fill="#CE9178" font-family="monospace"> '이름'</text>
  <text x="672" y="300" font-size="11" fill="#D4D4D4" font-family="monospace">,</text>
  <!-- Line 4 -->
  <text x="380" y="316" font-size="11" fill="#9CDCFE" font-family="monospace">email</text>
  <text x="420" y="316" font-size="11" fill="#569CD6" font-family="monospace"> VARCHAR</text>
  <text x="476" y="316" font-size="11" fill="#D4D4D4" font-family="monospace">(255)</text>
  <text x="516" y="316" font-size="11" fill="#D4D4D4" font-family="monospace"> UNIQUE</text>
  <text x="564" y="316" font-size="11" fill="#4EC9B0" font-family="monospace"> COMMENT</text>
  <text x="624" y="316" font-size="11" fill="#CE9178" font-family="monospace"> '이메일'</text>
  <text x="672" y="316" font-size="11" fill="#D4D4D4" font-family="monospace">,</text>
  <!-- Line 5 -->
  <text x="380" y="332" font-size="11" fill="#9CDCFE" font-family="monospace">created_at</text>
  <text x="444" y="332" font-size="11" fill="#569CD6" font-family="monospace"> TIMESTAMP</text>
  <text x="516" y="332" font-size="11" fill="#569CD6" font-family="monospace"> DEFAULT</text>
  <text x="568" y="332" font-size="11" fill="#4EC9B0" font-family="monospace"> CURRENT_TIMESTAMP</text>
  <text x="700" y="332" font-size="11" fill="#D4D4D4" font-family="monospace">,</text>
  <!-- Line 6 -->
  <text x="380" y="348" font-size="11" fill="#569CD6" font-family="monospace">PRIMARY KEY</text>
  <text x="460" y="348" font-size="11" fill="#D4D4D4" font-family="monospace"> (id)</text>
  <!-- Line 7 -->
  <text x="364" y="364" font-size="11" fill="#D4D4D4" font-family="monospace">);</text>
  <!-- blank -->
  <!-- Line 9 -->
  <text x="364" y="396" font-size="11" fill="#569CD6" font-family="monospace">CREATE</text>
  <text x="412" y="396" font-size="11" fill="#569CD6" font-family="monospace"> TABLE</text>
  <text x="460" y="396" font-size="11" fill="#9CDCFE" font-family="monospace"> posts</text>
  <text x="502" y="396" font-size="11" fill="#D4D4D4" font-family="monospace"> (</text>
  <!-- Line 10 -->
  <text x="380" y="412" font-size="11" fill="#9CDCFE" font-family="monospace">id</text>
  <text x="396" y="412" font-size="11" fill="#569CD6" font-family="monospace"> INT</text>
  <text x="424" y="412" font-size="11" fill="#D4D4D4" font-family="monospace"> NOT NULL</text>
  <text x="488" y="412" font-size="11" fill="#569CD6" font-family="monospace"> AUTO_INCREMENT</text>
  <text x="600" y="412" font-size="11" fill="#D4D4D4" font-family="monospace">,</text>
  <!-- Line 11 -->
  <text x="380" y="428" font-size="11" fill="#9CDCFE" font-family="monospace">user_id</text>
  <text x="428" y="428" font-size="11" fill="#569CD6" font-family="monospace"> INT</text>
  <text x="456" y="428" font-size="11" fill="#D4D4D4" font-family="monospace"> NOT NULL</text>
  <text x="520" y="428" font-size="11" fill="#D4D4D4" font-family="monospace">,</text>
  <!-- Line 12 -->
  <text x="380" y="444" font-size="11" fill="#9CDCFE" font-family="monospace">title</text>
  <text x="412" y="444" font-size="11" fill="#569CD6" font-family="monospace"> VARCHAR</text>
  <text x="468" y="444" font-size="11" fill="#D4D4D4" font-family="monospace">(200)</text>
  <text x="508" y="444" font-size="11" fill="#D4D4D4" font-family="monospace"> NOT NULL</text>
  <text x="572" y="444" font-size="11" fill="#4EC9B0" font-family="monospace"> COMMENT</text>
  <text x="632" y="444" font-size="11" fill="#CE9178" font-family="monospace"> '제목'</text>
  <text x="668" y="444" font-size="11" fill="#D4D4D4" font-family="monospace">,</text>
  <!-- Line 13 -->
  <text x="380" y="460" font-size="11" fill="#9CDCFE" font-family="monospace">content</text>
  <text x="428" y="460" font-size="11" fill="#569CD6" font-family="monospace"> TEXT</text>
  <text x="464" y="460" font-size="11" fill="#4EC9B0" font-family="monospace"> COMMENT</text>
  <text x="524" y="460" font-size="11" fill="#CE9178" font-family="monospace"> '본문'</text>
  <text x="560" y="460" font-size="11" fill="#D4D4D4" font-family="monospace">,</text>
  <!-- Line 14 -->
  <text x="380" y="476" font-size="11" fill="#569CD6" font-family="monospace">PRIMARY KEY</text>
  <text x="460" y="476" font-size="11" fill="#D4D4D4" font-family="monospace"> (id),</text>
  <!-- Line 15 -->
  <text x="380" y="492" font-size="11" fill="#569CD6" font-family="monospace">KEY</text>
  <text x="404" y="492" font-size="11" fill="#9CDCFE" font-family="monospace"> idx_user_id</text>
  <text x="484" y="492" font-size="11" fill="#D4D4D4" font-family="monospace"> (user_id),</text>
  <!-- Line 16 -->
  <text x="380" y="508" font-size="11" fill="#569CD6" font-family="monospace">CONSTRAINT</text>
  <text x="456" y="508" font-size="11" fill="#9CDCFE" font-family="monospace"> fk_posts_user</text>
  <text x="548" y="508" font-size="11" fill="#569CD6" font-family="monospace"> FOREIGN KEY</text>
  <!-- cursor blink -->
  <rect x="364" y="520" width="1.5" height="14" fill="#AE81FF" opacity="0.9"/>
  <!-- faded remaining lines -->
  <text x="364" y="540" font-size="11" fill="#4A5568" font-family="monospace">  (user_id) REFERENCES users (id)</text>
  <text x="364" y="556" font-size="11" fill="#4A5568" font-family="monospace">  ON DELETE CASCADE</text>
  <text x="364" y="572" font-size="11" fill="#D4D4D4" font-family="monospace">);</text>

  <!-- ── MODAL ACTIONS ── -->
  <!-- Info strip -->
  <rect x="316" y="618" width="648" height="36" rx="8" fill="#EEF4FF"/>
  <text x="328" y="640" font-size="12" fill="#0064E0" font-family="sans-serif">✦</text>
  <text x="346" y="640" font-size="12" fill="#1C2B33" font-family="sans-serif">COMMENT는 논리명으로 자동 매핑됩니다. FK는 관계선으로 변환됩니다.</text>

  <!-- Buttons -->
  <rect x="836" y="670" width="128" height="40" rx="8" fill="#0064E0"/>
  <text x="900" y="695" text-anchor="middle" font-size="14" font-weight="600" fill="white" font-family="sans-serif">ERD로 변환 →</text>

  <rect x="316" y="670" width="80" height="40" rx="8" fill="#F1F4F7" stroke="#DEE3E9" stroke-width="1"/>
  <text x="356" y="695" text-anchor="middle" font-size="13" fill="#5D6C7B" font-family="sans-serif">취소</text>
</svg>
