  <text x="752" y="27" text-anchor="middle" font-size="10" font-weight="700" fill="white" font-family="sans-serif">SY</text>
  <circle cx="776" cy="22" r="12" fill="#31A24C"/>
  <text x="776" y="27" text-anchor="middle" font-size="10" font-weight="700" fill="white" font-family="sans-serif">KM</text>
