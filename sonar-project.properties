sonar.organization=cartoonpoet
sonar.projectKey=cartoonpoet_ERDify
sonar.projectName=ERDify

sonar.sources=apps,packages
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/.vite/**,**/.astro/**,**/coverage/**,**/*.min.js,**/test-fixtures/**

sonar.tests=apps,packages
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# NestJS 모듈 와이어링(@Module 데코레이터 선언)과 typeorm CLI 진입점은
# 관례상 직접 유닛테스트하지 않는 순수 설정 파일이라 커버리지 요구에서 제외한다.
# (실제 로직은 database-options.factory.ts / get-database-url.ts로 추출해 별도 테스트함)
sonar.coverage.exclusions=apps/api/src/**/*.module.ts,packages/db/src/data-source.ts

sonar.javascript.lcov.reportPaths=\
apps/web/coverage/lcov.info,\
apps/api/coverage/lcov.info,\
apps/mcp-server/coverage/lcov.info,\
packages/contracts/coverage/lcov.info,\
packages/db/coverage/lcov.info,\
packages/domain/coverage/lcov.info,\
packages/erd-ui/coverage/lcov.info

sonar.sourceEncoding=UTF-8
