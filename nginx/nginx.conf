gzip on;
gzip_types application/json application/javascript text/css text/plain text/xml application/xml;
gzip_min_length 1024;
gzip_comp_level 6;
gzip_vary on;

# Docker 내장 DNS로 upstream 주소를 동적으로 갱신 (컨테이너 재시작 시 IP 변경 대응)
resolver 127.0.0.11 valid=10s ipv6=off;

# HTTP → HTTPS 리다이렉트 + ACME 챌린지
server {
    listen 80;
    server_name erdify.kro.kr erdify-app.kro.kr;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — erdify.kro.kr (랜딩)
server {
    listen 443 ssl;
    server_name erdify.kro.kr;
    client_max_body_size 50m;

    ssl_certificate     /etc/letsencrypt/live/erdify.kro.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/erdify.kro.kr/privkey.pem;
    include /etc/nginx/conf.d/ssl-params.conf;

    location / {
        set $landing erdify-landing-1;
        proxy_pass http://$landing:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# HTTPS — erdify-app.kro.kr (앱)
server {
    listen 443 ssl;
    server_name erdify-app.kro.kr;
    client_max_body_size 50m;

    ssl_certificate     /etc/letsencrypt/live/erdify-app.kro.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/erdify-app.kro.kr/privkey.pem;
    include /etc/nginx/conf.d/ssl-params.conf;

    location /socket.io/ {
        set $api erdify-api-1;
        proxy_pass http://$api:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # AI 채팅 SSE 스트리밍 — 버퍼링/gzip 비활성화, 긴 타임아웃 (에이전트 루프 대응)
    location = /api/ai/chat/stream {
        set $api erdify-api-1;
        proxy_pass http://$api:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        gzip off;
        chunked_transfer_encoding on;
        proxy_read_timeout 300s;
    }

    location /api/ {
        set $api erdify-api-1;
        proxy_pass http://$api:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        set $api erdify-api-1;
        proxy_pass http://$api:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        set $web erdify-web-1;
        proxy_pass http://$web:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# fallback
server {
    listen 80 default_server;
    server_name _;
    return 444;
}
