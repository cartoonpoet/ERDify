upstream erdify_api     { server erdify-api-1:4000; }
upstream erdify_web     { server erdify-web-1:80; }
upstream erdify_landing { server erdify-landing-1:80; }

server {
    listen 80 default_server;
    server_name _;
    client_max_body_size 50m;

    location /socket.io/ {
        proxy_pass http://erdify_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location ~ ^/(auth|organizations|projects|diagrams|health|uploads|mcp)(/|$) {
        proxy_pass http://erdify_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /introduce {
        return 301 /introduce/;
    }

    location /introduce/ {
        proxy_pass http://erdify_landing/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        proxy_pass http://erdify_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
