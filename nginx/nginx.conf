# Docker 내장 DNS로 upstream 주소를 동적으로 갱신 (컨테이너 재시작 시 IP 변경 대응)
resolver 127.0.0.11 valid=10s ipv6=off;

# 랜딩페이지 - erdify.kro.kr
server {
    listen 80;
    server_name erdify.kro.kr;
    client_max_body_size 50m;

    location / {
        set $landing erdify-landing-1;
        proxy_pass http://$landing:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# 웹앱 - erdify-app.kro.kr
server {
    listen 80;
    server_name erdify-app.kro.kr;
    client_max_body_size 50m;

    location /socket.io/ {
        set $api erdify-api-1;
        proxy_pass http://$api:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location /api/ {
        set $api erdify-api-1;
        proxy_pass http://$api:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        set $api erdify-api-1;
        proxy_pass http://$api:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        set $web erdify-web-1;
        proxy_pass http://$web:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# fallback
server {
    listen 80 default_server;
    server_name _;
    return 444;
}
