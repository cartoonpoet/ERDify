upstream erdify_api     { server erdify-api-1:4000; }
upstream erdify_web     { server erdify-web-1:80; }
upstream erdify_landing { server erdify-landing-1:80; }

# 랜딩페이지 - erdify.kro.kr
server {
    listen 80;
    server_name erdify.kro.kr;
    client_max_body_size 50m;

    location / {
        proxy_pass http://erdify_landing;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# 웹앱 - erdify-app.kro.kr
server {
    listen 80;
    server_name erdify-app.kro.kr;
    client_max_body_size 50m;

    location /socket.io/ {
        proxy_pass http://erdify_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location ~ ^/(auth|organizations|projects|diagrams|health|uploads|mcp)(/|$) {
        proxy_pass http://erdify_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://erdify_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# fallback
server {
    listen 80 default_server;
    server_name _;
    return 444;
}
