services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-erdify}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-erdify}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-erdify}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: ghcr.io/cartoonpoet/erdify-api:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_PORT: 4000
      DATABASE_URL: postgres://${DB_USER:-erdify}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-erdify}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
      - app

  web:
    image: ghcr.io/cartoonpoet/erdify-web:latest
    restart: unless-stopped
    networks:
      - app

  landing:
    image: ghcr.io/cartoonpoet/erdify-landing:latest
    restart: unless-stopped
    networks:
      - app

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - web
      - landing
    networks:
      - app

volumes:
  postgres_data:
  uploads:

networks:
  internal:
  app:
